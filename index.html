<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conferência de Mulheres</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="background-overlay"></div>

    <main class="container">
        <section class="branding">
            <div class="logo-wrapper">
                <div class="arch-shape">
                    <i class="fa-solid fa-leaf"></i>
                </div>
                <h1>CONFERÊNCIA <br> DE MULHERES</h1>
            </div>
            <p class="subtitle">CONFERÊNCIA DE MULHERES</p>
        </section>

        <section class="content-area">
            
            <div id="home" class="card active">
                <nav class="menu-links">
                    <button id="btn-inscricao">Inscrição</button>
                    <button id="btn-sobre">Sobre</button>
                </nav>
                <div class="social-icons">
                    <a href="https://www.instagram.com/adagapeigreja?igsh=MW91bTE4dTBhY2J4MA==" target="_blank" aria-label="Instagram">
                        <i class="fa-brands fa-instagram"></i>
                    </a>
                </div>
            </div>

            <div id="cadastro" class="card">
                <h3>Cadastro</h3>
                <form id="form-cadastro">
                    <input type="text" placeholder="Nome Completo:" required>
                    <input type="text" id="input-cpf" placeholder="CPF:" maxlength="14" required>
                    <input type="text" id="input-telefone" placeholder="Número:" maxlength="15" required>
                    
                    <input type="text" id="input-congregacao" list="lista-congregacoes" placeholder="Congregação Ágape:">
                    <datalist id="lista-congregacoes">
                        <option value="Icaraí">
                        <option value="Itambé">
                        <option value="Metropolitano">
                        <option value="Planalto">
                        <option value="Sede">
                        <option value="Tanupaba">
                    </datalist>

                    <input type="text" placeholder="Sou de outra Igreja:">
                    
                    <div class="button-group">
                        <button type="button" class="btn-alt back-btn">Voltar</button>
                        <button type="submit" class="btn-action" id="finalizar-inscricao">Pagamento</button>
                    </div>
                </form>
            </div>

            <div id="sobre" class="card">
                <h3>Sobre</h3>
                <div class="text-content">
                    <p>Espaço reservado para a descrição do evento, missão e visão da conferência de mulheres.</p>
                </div>
                <button class="btn-alt back-btn">Voltar</button>
            </div>

        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
